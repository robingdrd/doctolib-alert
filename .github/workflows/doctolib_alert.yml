name: Doctolib Alert - Maba DIARRA

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  check-availability:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restaurer le cache des creneaux vus
        uses: actions/cache@v4
        with:
          path: seen_slots.json
          key: seen-slots-${{ github.run_id }}
          restore-keys: seen-slots-

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verifier les creneaux Doctolib
        env:
          EMAIL_DESTINATAIRE: ${{ secrets.EMAIL_DESTINATAIRE }}
          EMAIL_EXPEDITEUR:   ${{ secrets.EMAIL_EXPEDITEUR }}
          EMAIL_MOT_DE_PASSE: ${{ secrets.EMAIL_MOT_DE_PASSE }}
        run: python doctolib_alert.py
